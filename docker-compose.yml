services:
  # MongoDB database container
  mongodb:
    image: mongo:7
    container_name: todoapp-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - todoapp-network

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todoapp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_URL=mongodb://mongodb:27017/tododb
      - APP_NAME=TodoApp
    depends_on:
      - mongodb
    networks:
      - todoapp-network

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todoapp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - todoapp-network

volumes:
  mongo_data:

networks:
  todoapp-network:
    driver: bridge
